<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#275333"/>
      <stop offset="100%" stop-color="#0e1d12"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8cc196"/>
      <stop offset="100%" stop-color="#3f834f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Stem -->
  <path d="M256 420 C 256 320, 256 240, 256 160" stroke="#5ea16c" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Big leaf left -->
  <path d="M256 300 C 160 300, 110 240, 110 180 C 180 180, 240 220, 256 280 Z" fill="url(#leaf)"/>
  <!-- Big leaf right -->
  <path d="M256 240 C 352 240, 402 180, 402 120 C 332 120, 272 160, 256 220 Z" fill="url(#leaf)"/>
  <!-- Small leaf -->
  <path d="M256 360 C 200 360, 170 320, 170 280 C 220 280, 252 308, 256 348 Z" fill="#bcdcc1" opacity="0.85"/>
  <!-- Pot -->
  <path d="M170 410 L 342 410 L 322 470 Q 256 488 190 470 Z" fill="#a4593a"/>
  <rect x="160" y="398" width="192" height="22" rx="6" fill="#c0734f"/>
</svg>
