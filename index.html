<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f3a2b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grok Garden" />
    <meta
      name="description"
      content="Grok Garden — your personal plant care assistant powered by Grok."
    />
    <title>Grok Garden</title>
    <script>
      // Prevent dark-mode flash: apply the saved (or system) theme synchronously
      // before React paints. Mirrors the logic in src/hooks/useTheme.tsx.
      (function () {
        try {
          var saved = localStorage.getItem("grokgarden:theme");
          var dark =
            saved === "dark" ||
            (saved !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
